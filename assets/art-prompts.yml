# AI image-generation prompts — one per unowned Flickr image to replace.
# House style: docs/art-style.md. Paste `prompt` into openart.ai with the
# negative prompt from the style doc; save the result to assets/<filename>,
# then run scripts/normalize_art.py to knock the background out (transparent).
# `review: true` = concept inferred from the title; double-check it fits.
style_suffix: minimalist editorial line illustration, single-weight line art in deep brown (#491705) with one muted terracotta (#914f37) accent, plain solid uniform off-white background, flat with no gradients or shadows, generous negative space, conceptual and timeless, centered, no text, no lettering, not photorealistic
negative_prompt: photograph, photorealistic, 3d render, text, words, letters, watermark, signature, busy, cluttered, gradient, drop shadow, neon, harsh colors, multiple accent colors
