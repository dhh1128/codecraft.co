name: check links in markdown files

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    
jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --verbose './**/*.md'
          fail: true
