name: check links in markdown files

on:
  workflow_dispatch:        # run on demand
  schedule:
    # Quarterly (~every 90 days): 00:00 UTC on the 1st of Jan/Apr/Jul/Oct.
    # cron has no exact N-day interval; this is the standard "every 3 months".
    # External link rot shouldn't fail individual pushes — this is a periodic
    # report, not a per-commit gate. (pytest CI is the per-push gate.)
    - cron: '0 0 1 */3 *'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --verbose './**/*.md'
          fail: true
