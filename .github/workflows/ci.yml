name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Frontmatter parses cleanly
        run: python scripts/fix_frontmatter.py --check-only
      - name: Item-ids and tags are current
        run: python scripts/assign_ids.py --check-only
      - name: Run tests
        run: pytest -q
