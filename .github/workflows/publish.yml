name: Publish site to GitHub Pages

# Builds the Zensical site and deploys it to GitHub Pages, replacing the legacy
# Jekyll (pages-build-deployment) build. Requires the repo's Pages source to be
# set to "GitHub Actions" (build_type=workflow) — see README/ROADMAP.
#
# All actions pinned to node24 / composite runtimes (no deprecated node20):
#   checkout@v6, setup-python@v6, upload-pages-artifact@v5,
#   configure-pages@v6, deploy-pages@v5.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-progress deploy finish rather than cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Tests must pass before publishing
        run: pytest -q
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Assemble essays + build with Zensical
        run: |
          python scripts/build_site.py
          cd build && NO_COLOR=1 TERM=dumb zensical build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
